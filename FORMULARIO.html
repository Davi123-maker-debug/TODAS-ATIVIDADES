<!DOCTYPE html>
<html>
<head>
    <title>Inscrição Campeonato de Games</title>
</head>
<body>

    <h1>Inscrição para Campeonato de Games</h1>

    <form>

        <fieldset>
            <legend>Dados do Participante</legend>

            <label>Nome Completo:</label><br>
            <input type="text" name="nome"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Telefone:</label><br>
            <input type="tel" name="telefone"><br><br>

            <label>Idade:</label><br>
            <input type="number" name="idade"><br><br>

            <label>Data de Nascimento:</label><br>
            <input type="date" name="nascimento"><br><br>

            <label>Nome de Usuário no Jogo:</label><br>
            <input type="text" name="usuario"><br><br>

            <label>Cidade:</label><br>
            <input type="text" name="cidade"><br><br>

            <label>Jogo Favorito:</label><br>
            <select name="jogo">
                <option>Minecraft</option>
                <option>Free Fire</option>
                <option>Valorant</option>
                <option>Fortnite</option>
                <option>League of Legends</option>
            </select>
            <br><br>

            <label>Categoria:</label><br>
            <input type="radio" name="categoria"> Amador
            <input type="radio" name="categoria"> Intermediário
            <input type="radio" name="categoria"> Profissional
            <br><br>

            <label>Plataforma Utilizada:</label><br>
            <input type="checkbox"> PC<br>
            <input type="checkbox"> Xbox<br>
            <input type="checkbox"> PlayStation<br>
            <input type="checkbox"> Celular<br><br>

            <label>Conte um pouco sobre sua experiência:</label><br>
            <textarea rows="5" cols="40"></textarea>
            <br><br>

            <button type="submit">Enviar Inscrição</button>
            <button type="reset">Limpar Dados</button>

        </fieldset>

    </form>

</body>
</html>
